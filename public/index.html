<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#020617">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>BluePeak Finance | Secure Vault</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    colors: {
                        brand: {
                            blue: '#1E90FF',
                            gold: '#C9A227',
                            emerald: '#10B981',
                            dark: '#020617',
                            panel: '#0A101C'
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body { 
            background-color: #020617; 
            color: #ffffff;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* Premium Scrollbar */
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.02); }
        ::-webkit-scrollbar-thumb { background: rgba(30, 144, 255, 0.3); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(30, 144, 255, 0.6); }

        /* Smooth Page Transitions */
        .animate-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Premium Loader Animations */
        .pulse-ring {
            position: absolute;
            inset: -10px;
            border-radius: 32px;
            border: 1px solid rgba(30, 144, 255, 0.5);
            animation: pulseRing 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulseRing {
            0% { transform: scale(0.9); opacity: 1; }
            100% { transform: scale(1.3); opacity: 0; }
        }
    </style>

    <script>
        window.onerror = function(message, source, lineno, colno, error) {
            document.body.innerHTML = `
                <div style="padding: 40px; text-align: center; font-family: 'Inter', sans-serif; background: #020617; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center;">
                    <div style="width: 80px; height: 80px; background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 32px; margin-bottom: 24px; box-shadow: 0 0 30px rgba(239,68,68,0.2);">🛑</div>
                    <h2 style="color: #ffffff; margin-bottom: 8px; font-weight: 900; font-size: 24px; letter-spacing: -0.5px;">System Exception</h2>
                    <p style="font-size: 12px; color: #94a3b8; margin-bottom: 32px; max-width: 80%; line-height: 1.6;">${message}<br><span style="color: #475569;">Line: ${lineno}</span></p>
                    <button onclick="window.localStorage.clear(); window.location.reload(true)" style="padding: 16px 32px; background: linear-gradient(to right, #1E90FF, #0070F3); color: white; border: none; border-radius: 16px; font-weight: 900; font-size: 12px; text-transform: uppercase; letter-spacing: 2px; cursor: pointer; box-shadow: 0 0 20px rgba(30,144,255,0.4);">Reset Vault Data</button>
                </div>`;
            return true;
        };
    </script>
</head>
<body class="bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-[#111827] via-[#020617] to-black min-h-screen selection:bg-brand-blue/30">

    <div class="fixed top-0 left-1/2 -translate-x-1/2 w-full max-w-lg h-[400px] bg-brand-blue/10 rounded-full blur-[100px] pointer-events-none z-0"></div>

    <div id="app" class="relative z-10">
        <div class="min-h-screen flex flex-col justify-center items-center animate-in">
            <div class="relative mb-8">
                <div class="pulse-ring"></div>
                <div class="w-20 h-20 bg-gradient-to-br from-brand-blue to-[#0070F3] rounded-[24px] shadow-[0_0_40px_rgba(30,144,255,0.5)] flex items-center justify-center border border-white/10 relative z-10 overflow-hidden">
                    <div class="absolute inset-0 bg-white/20 blur-[20px] rounded-full top-0 left-0"></div>
                    <span class="text-3xl text-white font-black relative z-10 tracking-tighter">BP</span>
                </div>
            </div>
            
            <h1 class="text-2xl font-black text-white tracking-tight mb-2">BLUEPEAK<span class="text-brand-blue">.</span></h1>
            
            <div class="flex items-center gap-2 mt-4">
                <div class="w-4 h-4 rounded-full border-2 border-white/10 border-t-brand-blue animate-spin"></div>
                <p class="text-gray-500 text-[9px] font-bold text-transform: uppercase tracking-[0.2em]">Initializing Secure Vault...</p>
            </div>
        </div>
    </div>

    <noscript>
        <div class="fixed inset-0 bg-[#020617] z-[100] flex flex-col items-center justify-center p-8 text-center">
            <div class="text-5xl mb-6 opacity-80">⚠️</div>
            <h2 class="text-white text-2xl font-black mb-2">JavaScript Required</h2>
            <p class="text-gray-400 text-xs leading-relaxed max-w-xs">BluePeak Finance requires JavaScript to run its secure encryption framework. Please enable it in your browser settings to continue.</p>
        </div>
    </noscript>

    <script src="app.js?v=2.1"></script>
    
</body>
            </html>
