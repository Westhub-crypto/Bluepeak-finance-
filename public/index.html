<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BluePeak Finance | Elite Premium Investment</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        body { 
            background-color: #020617; 
            font-family: 'Inter', sans-serif; 
            color: white; 
            margin: 0; 
            overflow-x: hidden;
        }
        .animate-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(10px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
        
        /* Premium Loader Animation */
        .loader {
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-left-color: #1E90FF;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px auto;
        }
        @keyframes spin { 
            0% { transform: rotate(0deg); } 
            100% { transform: rotate(360deg); } 
        }
    </style>

    <script>
        window.onerror = function(message, source, lineno, colno, error) {
            document.body.innerHTML = `
                <div style="padding: 40px; text-align: center; font-family: sans-serif; background: #020617; height: 100vh; display: flex; flex-direction: column; justify-content: center;">
                    <div style="font-size: 40px; margin-bottom: 20px;">⚠️</div>
                    <h2 style="color: #ef4444; margin-bottom: 10px; font-weight: 900;">SYSTEM CRASH</h2>
                    <p style="font-size: 14px; color: #94a3b8; margin-bottom: 5px;">${message}</p>
                    <p style="font-size: 11px; color: #475569;">Line: ${lineno}</p>
                    <button onclick="window.location.reload(true)" style="margin-top: 30px; padding: 15px 30px; background: #1E90FF; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer;">Force Refresh Application</button>
                </div>`;
            return true;
        };
    </script>
</head>
<body>

    <div id="app">
        <div style="height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center;">
            <div class="loader"></div>
            <h1 style="font-size: 28px; font-weight: 900; font-style: italic; margin: 0;">BLUEPEAK<span style="color: #1E90FF;">.</span></h1>
            <p style="color: #64748b; font-size: 10px; font-weight: bold; text-transform: uppercase; letter-spacing: 3px; margin-top: 12px;">Initializing Vault...</p>
        </div>
    </div>

    <noscript>
        <div style="padding: 40px; text-align: center; margin-top: 50px;">
            <h2 style="color: #ef4444;">JavaScript Disabled</h2>
            <p style="color: #94a3b8; font-size: 14px; mt-4">BluePeak requires JavaScript to run its secure financial framework. Please enable it in your browser settings.</p>
        </div>
    </noscript>

    <script src="app.js?v=2.0"></script>
    
</body>
        </html>
